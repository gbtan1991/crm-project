services:
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: meisterflow-migrate
    profiles:
      - app
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - env_file
    container_name: meisterflow-app
    restart: unless-stopped
    profiles:
      - app
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    depends_on:
      migrate:
        condition: service_completed_successfully

  postgres:
    image: postgres:16.6-alpine
    container_name: meisterflow-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meisterflow} -d ${POSTGRES_DB:-meisterflow_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: meisterflow-postgres-data

secrets:
  env_file:
    file: .env
